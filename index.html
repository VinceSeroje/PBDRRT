<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Member Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Member Profile</h1>
    <div class="row">
        <div class="col-md-4">
            <h2>Admin Profile</h2>
            <img id="admin-profile-pic" src="default.png" alt="Admin Profile Picture" class="img-fluid">
            <input type="file" id="admin-pic-upload" class="form-control-file mt-2" accept="image/*">
            <button class="btn btn-primary mt-2">Upload</button>
        </div>
        <div class="col-md-8">
            <h2>Member Profile</h2>
            <form>
                <div class="form-group">
                    <label for="member-name">Name</label>
                    <input type="text" class="form-control" id="member-name" required>
                </div>
                <div class="form-group">
                    <label for="member-profile-pic">Profile Picture</label>
                    <img id="member-profile-pic" src="default.png" alt="Member Profile Picture" class="img-fluid mt-2">
                    <input type="file" id="member-pic-upload" class="form-control-file mt-2" accept="image/*">
                    <button class="btn btn-secondary mt-2">Edit/Upload</button>
                </div>
                <div class="form-group">
                    <label for="position">Position</label>
                    <select class="form-control" id="position">
                        <option>Local</option>
                        <option>District</option>
                        <option>Provincial</option>
                        <option>RACS</option>
                        <option>Marshall</option>
                        <option>K9</option>
                        <option>Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="province">Province</label>
                    <select class="form-control" id="province">
                        <option>Choose Province</option>
                        <option>Province 1</option>
                        <option>Province 2</option>
                        <option>Province 3</option>
                        <!-- Add all Philippine provinces here -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="zone">Zone</label>
                    <select class="form-control" id="zone">
                        <option>Zone 1</option>
                        <option>Zone 2</option>
                        <option>Zone 3</option>
                        <option>Zone 4</option>
                        <option>Zone 5</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
